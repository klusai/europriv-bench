# KLU-118 refpop / crosswalk manifest — vendored, checksummed, license-gated sources.
#
# Every vendored data file MUST appear here with a license on the CI allowlist
# (CC-BY-4.0, CC-BY-3.0, EU-2011/833, ROU-OGL). The license-gate test
# (tests/test_refpop_license_gate.py) fails the build on any source whose license is
# not on the allowlist, or whose on-disk SHA-256 does not match the recorded checksum.
#
# v1 vendors only the RO county -> NUTS-2 crosswalk needed for the within-corpus
# k-anonymity diagnostic. NO census population / microdata is vendored (that is v2 PURR,
# blocked on a census-calibrated generator — see docs/klu-118-qi-distinctiveness-design.md).

allowlist:
  - CC-BY-4.0
  - CC-BY-3.0
  - EU-2011/833
  - ROU-OGL

sources:
  - id: ro_county_nuts2
    path: crosswalks/ro_county_nuts2.csv
    sha256: 89cffd6a41ebfd26ca8b2adad92e3a7995520144381347be2b7e85ed0925f49e
    role: >-
      RO CNP county-code (JJ) -> county name -> NUTS-2 region crosswalk for the v1
      locality QI field (county -> NUTS-2 binning).
    retrieved: "2026-06-06"
    components:
      - what: CNP county-code (JJ) ordering -> county name
        source: Romanian CNP spec (Law 190/2018 art. 4; vimishor/cnp-spec)
        license: ROU-OGL
        attribution: >-
          Romanian Government open administrative data (CNP county-code ordering),
          ROU-OGL.
      - what: county -> NUTS-2 region assignment
        source: Eurostat NUTS 2021 classification (Romania)
        license: EU-2011/833
        attribution: >-
          Eurostat, NUTS 2021 classification. (C) European Union. Re-use authorised
          under Commission Decision 2011/833/EU, with attribution.

  # RES-17 (v2 PURR machinery): a COMMITTED SYNTHETIC PLACEHOLDER census cross-tabulation,
  # used ONLY to exercise the IPF / population-uniqueness code in tests + a runnable example.
  # It is our OWN hand-authored invention (NOT real census data, NOT for any reported number)
  # -> fully clean, CC-BY-4.0, nothing upstream to attribute. The license-gate covers it like
  # any vendored file (checksum + allowlisted license); the placeholder flag lives in the file's
  # own `meta` block and is asserted by the build_joint loader + the license-gate test. The real
  # Eurostat 2021 Census Hub hypercubes are a DEFERRED follow-up (gated on the census-calibrated
  # generator — see docs/klu-118-qi-distinctiveness-design.md) and will get their own entries here.
  - id: synthetic_census_xx
    path: fixtures/synthetic_census_xx.yaml
    sha256: efc6cc10a6db14cbec882ed42a35191664822d44c60ac6b3a6c68c36204a7f52
    role: >-
      ILLUSTRATIVE PLACEHOLDER — synthetic per-country census cross-tabulations for the IPF
      build_joint + Rocher-2019 population-uniqueness unit tests and runnable example. NOT real
      census data; NOT for any reported PURR number on any real benchmark config.
    retrieved: "2026-06-06"
    placeholder: true
    components:
      - what: synthetic census cross-tabulations (age-band x sex x NUTS-2) for fictional country XX
        source: hand-authored by KlusAI for RES-17 (no upstream source; not real population data)
        license: CC-BY-4.0
        attribution: >-
          Synthetic illustrative placeholder authored by KlusAI for EuroPriv-Bench RES-17.
          NOT real census data. CC-BY-4.0.
