name: "PII Detection — Swedish (Ai4Privacy open core, external synthetic)"
version: 1
task: detection
domain: general
languages: [sv]

dataset:
  hf_id: klusai/europriv-bench
  config: ai4privacy-openpii-sv-v1
  split: test
  license: CC-BY-4.0   # ai4privacy/pii-masking-openpii-1m open core (RES-93, verified 2026-06-07)

# De-identification is recall-sensitive → report F2 alongside strict F1.
metrics:
  - entity_f1
  - entity_f2

# config_status=dev. EXTERNAL SYNTHETIC: generated by Ai4Privacy's LLM pipeline (NOT the KP
# generator, NOT real data) — a harder, field-comparable test than our template-splice LocalePacks,
# adopted to break the F1=1.000 saturation of our own synthetic eval (RES-93). NOT real gold.
description: >
  Entity-level PII detection over Swedish text from the Ai4Privacy open core
  (ai4privacy/pii-masking-openpii-1m, CC-BY-4.0), a held-out slice of the validation split
  remapped to the harmonized KP taxonomy via the shared crosswalk (byte-equality + strict BIOES).
  External synthetic: Ai4Privacy's LLM generator, not ours. openmed/tabularisai were trained on
  Ai4Privacy → they score this config in_distribution (see leaderboard contamination markers).
