name: "PII Detection + CNP Leakage — Romanian (synthetic v1)"
version: 1
task: detection
domain: general
languages: [ro]

dataset:
  hf_id: klusai/europriv-bench
  config: ro-synthetic-v1
  split: test
  license: CC-BY-4.0

# Detection F1/F2 PLUS the RO headline: deterministic CNP re-identification leakage.
# Headline uses the unified national_id_leakage metric (RES-82); rows default to country=RO, so it
# dispatches to the CNP validator — same per-subject leak_rate/CIs/counts the cnp_leakage alias emit.
metrics:
  - entity_f1
  - entity_f2
  - national_id_leakage

description: >
  Romanian PII detection over localized-synthetic documents (RO-native identifiers incl. CNP,
  RO IBAN, CUI, county plates, +40 phones), offset-deterministic generation. The headline is
  national_id_leakage (CNP channel): a missed CNP deterministically discloses date-of-birth + sex +
  county. v0 = pure
  localized synthetic (development track); real-skeleton gold (ro-realskeleton-v1) follows.
