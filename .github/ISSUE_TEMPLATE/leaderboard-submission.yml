name: Leaderboard submission
description: Propose adding a public model to the EuroPriv-Bench leaderboard.
title: "[submission] <org/model>"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        Protocol: klusai-papers `SUBMISSIONS.md`. You provide a **public model + adapter scheme +
        filled model card**; you do **not** report scores. The submission CI (KLU-16) builds the
        declared built-in adapter, runs `europriv run` on the public configs in a **no-secrets
        sandbox**, validates the card, and appends a provenance-stamped row
        (contamination=`unknown` until classified). To actually land on the board, open a PR with
        the `submission.md` PR template; this issue is for proposing/tracking.
  - type: input
    id: hf_model_id
    attributes:
      label: Version-pinned model/tool id
      description: >
        Public reference pinning an immutable version. HF model: `org/model@<sha>`; non-HF tool
        (e.g. Presidio): `org/tool@<version>` — not a moving tag.
      placeholder: "org/model@<commit-sha>"
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Adapter scheme
      description: Which built-in adapter (`adapters.BUILDERS`) the harness uses to call the model.
      options:
        - privacy-filter
        - openmed
        - tabularisai
        - gliner
        - kp-model
        - presidio
    validations:
      required: true
  - type: textarea
    id: model_card
    attributes:
      label: Filled model card
      description: >
        Paste your filled copy of `.github/MODEL_CARD_TEMPLATE.yaml` (training-data provenance +
        licensing, intended use, languages/domains, known limitations, contamination statement).
      render: yaml
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: The model/tool is public and the id pins an immutable version (HF `@<sha>` or a non-HF tool release `@<version>`).
          required: true
        - label: The adapter scheme is one of the built-in `adapters.BUILDERS` (no custom code).
          required: true
        - label: I am not self-reporting scores — CI produces the leaderboard row.
          required: true
